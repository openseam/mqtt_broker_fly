app = "openseam-emqx"
primary_region = "iad"

[build]

[env]
  # EMQX_NODE__NAME is set dynamically in bootstrap.sh using FLY_MACHINE_ID so
  # every machine in the cluster gets a unique Erlang node name.
  # Do NOT set EMQX_NODE__NAME here — bootstrap.sh owns it.
  EMQX_NODE__COOKIE = "openseam-emqx-node-cookie-prod"
  EMQX_LOG__CONSOLE__LEVEL = "warning"
  EMQX_AUTHENTICATION = "[{\"mechanism\":\"password_based\",\"backend\":\"built_in_database\",\"enable\":true}]"

  # Cluster discovery via Fly.io private network DNS.
  # openseam-emqx.internal resolves to the IPv6 addresses of all running machines.
  EMQX_CLUSTER__DISCOVERY_STRATEGY = "dns"
  EMQX_CLUSTER__DNS__NAME = "openseam-emqx.internal"
  EMQX_CLUSTER__DNS__RECORD_TYPE = "aaaa"

# MQTT broker — raw TCP on port 1883.
# Requires a dedicated public IPv4 (fly ips allocate-v4).
# The dashboard API (port 18083) is internal only — never exposed externally.
# Cluster communication (Erlang dist port 4370, cluster RPC port 5369) happens
# over Fly.io's private network (6PN) — no explicit service config required.
[[services]]
  internal_port = 1883
  protocol = "tcp"
  auto_stop_machines = "off"
  auto_start_machines = true
  # Scale with: flyctl scale count N --app openseam-emqx
  # Each performance-1x node (2 GB RAM) handles ~65K concurrent connections.
  # For 1M seambits: use performance-2x (4 GB) × 4 nodes, or performance-4x × 2-3 nodes.
  min_machines_running = 1

  [[services.ports]]
    port = 1883

  [[services.tcp_checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "150s"

[[vm]]
  cpu_kind = "performance"
  cpus = 1
  memory_mb = 2048
